<!DOCTYPE html>
<html>
<head>
    <title>Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Navbar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            height: 60px;
            border-bottom: 1px solid #ccc;
        }

        nav .site-name {
            font-size: 1.5rem;
            font-weight: bold;
        }

        nav .user-icon {
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* Content area below navbar */
        .content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Filters sidebar */
        .sidebar {
            width: 250px;
            border-right: 1px solid #ccc;
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar h3 {
            margin-bottom: 15px;
        }

        /* Search form inside sidebar */
        .sidebar form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar input {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .sidebar button {
            padding: 8px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        /* Map */
        #map {
            flex: 1;
            height: 100%;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav>
        <span class="site-name">BearEstate</span>
        <span class="user-icon">&#9398;</span>
    </nav>

    <!-- Content -->
    <div class="content">

        <!-- Sidebar -->
        <div class="sidebar">
            <h3>Filters</h3>
            <form method="POST">
                {% csrf_token %}
                <input type="text" name="address" placeholder="Enter an address...">
                <button type="submit">Search</button>
            </form>
        </div>

        <!-- Map -->
        <div id="map"></div>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([39.5501, -105.7821], 7);

        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19,
            referrerPolicy: 'no-referrer-when-downgrade'
        }).addTo(map);

        let markers = [];
        const locations = {{ properties|safe }};

        locations.forEach(loc => {
        if (loc.lat && loc.lng) {
            const marker = L.marker([loc.lat, loc.lng]).addTo(map);
            markers.push(marker);
            }
    });


    const searchedLocation = {{ searched_location|safe }};

    if (searchedLocation) {
        function clearMarkers() {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
        }

        clearMarkers();
        const marker = L.marker([searchedLocation.lat, searchedLocation.lng]).addTo(map);
        markers.push(marker);

        map.flyTo([searchedLocation.lat, searchedLocation.lng], 15, {
            animate: true,
            duration: 1.5
        });
    }
    </script>

</body>
</html>
