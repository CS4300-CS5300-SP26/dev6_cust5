{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BearEstate — Search</title>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=DM+Sans&display=swap" rel="stylesheet">

    <!-- UIkit -->
    <link href="https://cdn.jsdelivr.net/npm/uikit@3.21.0/dist/css/uikit.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/uikit@3.21.0/dist/js/uikit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/uikit@3.21.0/dist/js/uikit-icons.min.js"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">

    <style>
        .hero { position: relative; padding: 80px 3rem 40px; }
        .hero-bg-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
        .hero-grid { position: relative; z-index: 2; display: flex; justify-content: center; }
        .hero-inner { background: rgba(255,255,255,0.7); padding: 24px; border-radius: 12px; }

        .nav-right { display: flex; gap: 10px; align-items: center; }
        .nav-bear { height: 36px; width: 36px; border-radius: 50%; }

        .search-bar { display: flex; gap: 10px; }
    </style>
</head>

<body>

<!-- Top Banner -->
<div class="top-banner">
    <a href="/"><h1>BearEstate</h1></a>
    <div class="nav-right">
        <img src="{% static 'images/bear.png' %}" class="nav-bear">
    </div>
</div>

<!-- Hero -->
<section class="hero">
    <img src="{% static 'images/college_snow.jpg' %}" class="hero-bg-img">
    <div class="hero-grid">
        <div class="hero-inner">
            <div class="search-bar">
                <input id="searchLocation" placeholder="Location">
                <select id="searchIntent">
                    <option value="rent">Rent</option>
                    <option value="buy">Buy</option>
                </select>
                <select id="searchType">
                    <option>Any Type</option>
                </select>
                <select id="searchBudget"></select>
                <button id="searchBtn">Search →</button>
            </div>
        </div>
    </div>
</section>

<!-- MAP -->
<div id="map" style="height: 500px; margin: 20px;"></div>

<!-- Roommates -->
<section>
    <div id="carouselTrack"></div>
</section>

<!-- Demo listings -->
<script>
const DEMO_LISTINGS = [
    { name:"Mara", rent:850 },
    { name:"Jake", rent:620 }
];

const track = document.getElementById('carouselTrack');
DEMO_LISTINGS.forEach(p => {
    const div = document.createElement('div');
    div.innerHTML = `<p>${p.name} - $${p.rent}</p>`;
    track.appendChild(div);
});
</script>

<!-- ✅ SAFE DJANGO DATA (FIXED — NO JS ERRORS) -->
<script type="application/json" id="properties-data">
[
    {% for p in properties %}
    {
        "title": "{{ p.title|escapejs }}",
        "location": "{{ p.location|escapejs }}",
        "price": "{{ p.price }}",
        "lat": {{ p.latitude|default:0 }},
        "lng": {{ p.longitude|default:0 }}
    }{% if not forloop.last %},{% endif %}
    {% endfor %}
]
</script>

<script>
const properties = JSON.parse(
    document.getElementById('properties-data').textContent
);
</script>

<!-- MAP SCRIPT -->
<script>
var map = L.map('map').setView([39.7392, -104.9903], 10);

// Tile layer
L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
}).addTo(map);

// bounds for auto zoom
let bounds = [];

// markers
properties.forEach(p => {
    if (p.lat && p.lng) {
        const marker = L.marker([p.lat, p.lng])
            .addTo(map)
            .bindPopup(`
                <b>${p.title}</b><br>
                ${p.location}<br>
                $${p.price}
            `);

        bounds.push([p.lat, p.lng]);
    }
});

// auto fit
if (bounds.length > 1) {
    map.fitBounds(bounds, { padding: [50, 50] });
} else if (bounds.length === 1) {
    map.setView(bounds[0], 13);
}
</script>

</body>
</html>
