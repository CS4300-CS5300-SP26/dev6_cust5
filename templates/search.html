{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BearEstate — Search</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- UIkit CSS -->
    <link href="https://cdn.jsdelivr.net/npm/uikit@3.21.0/dist/css/uikit.min.css" rel="stylesheet">

    <!-- BearEstate Styles -->
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">

    <!-- UIkit JS -->
    <script src="https://cdn.jsdelivr.net/npm/uikit@3.21.0/dist/js/uikit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/uikit@3.21.0/dist/js/uikit-icons.min.js"></script>

    <style>
        /* ── Hero: background image flush to banner ─────────────────── */
        .hero {
            position: relative;
            overflow: hidden;
            margin-top: 0;
            padding: 80px 3rem 40px;
        }

        .hero-bg-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            z-index: 0;
        }

        /* Lighter overlay so the image shows through */
        .hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(218, 238, 255, 0.45),
                rgba(218, 238, 255, 0.30)
            );
            z-index: 1;
        }

        /* Hero content sits above the image/overlay */
        .hero-grid {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 160px;
            padding: 0 2rem;
        }

        .hero-inner {
            max-width: 1100px;
            width: 100%;
            animation: fadeUp 1s cubic-bezier(0.22,1,0.36,1) both;
            background: rgba(255,255,255,0.62);
            border: 1px solid rgba(93,209,227,0.25);
            border-radius: 18px;
            padding: 32px 36px 28px;
            box-shadow: 0 18px 55px rgba(30, 90, 120, 0.12);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero-inner .search-bar {
            width: 100%;
            max-width: 100%;
        }

        /* ── Fix nav: bear logo small, buttons stay in banner ───────── */
        .nav-right {
            display: flex;
            align-items: center;
            gap: 0.85rem;
        }

        .nav-bear {
            height: 36px;
            width: 36px;
            object-fit: cover;
            border-radius: 50%;
            display: block;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.15));
        }

        /* ── Remove the dark second rectangle from search-bar--wide ─── */
        .search-bar--wide,
        .search-section {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            padding: 0 !important;
        }

        /* ── Roommate section with baby blue card ───────────────────── */
        .roommate-section {
            background: var(--sky);
            padding: 40px 0 0;
            min-height: calc(100vh - 60px);
            display: flex;
            flex-direction: column;
        }

        .roommate-section-inner {
            max-width: 100%;
            margin: 0;
            padding: 0;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Card-wrap matches sky exactly, stretches to fill remaining height */
        .roommate-card-wrap {
            background: var(--sky);
            border-top: 1.5px solid rgba(93, 209, 227, 0.25);
            border-bottom: none;
            border-left: none;
            border-right: none;
            border-radius: 0;
            padding: 28px 2.5rem 40px;
            box-shadow: none;
            flex: 1;
        }

        .roommate-card-wrap-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .roommate-card-wrap-header h3 {
            font-family: var(--font-display);
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text);
        }

        .roommate-card-wrap-header a {
            font-size: 0.85rem;
            color: var(--teal-dark);
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px solid var(--teal-dark);
        }

        /* ── Carousel ───────────────────────────────────────────────── */
        .carousel-outer { position: relative; }

        .carousel-track {
            display: grid;
            grid-auto-flow: column;
            grid-auto-columns: calc((100% - 32px) / 3);
            gap: 16px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 12px;
            scrollbar-width: thin;
            scrollbar-color: var(--blue) transparent;
        }
        .carousel-track::-webkit-scrollbar { height: 4px; }
        .carousel-track::-webkit-scrollbar-track { background: transparent; }
        .carousel-track::-webkit-scrollbar-thumb { background: var(--blue); border-radius: 4px; }

        .carousel-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-60%);
            width: 38px; height: 38px;
            border-radius: 50%;
            background: rgba(255,255,255,0.92);
            border: 1.5px solid rgba(93,209,227,0.35);
            box-shadow: 0 2px 12px rgba(26,122,138,0.15);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: background 0.2s, border-color 0.2s;
            font-size: 1rem;
            color: var(--teal-dark);
        }
        .carousel-arrow:hover { background: var(--teal-dark); color: white; border-color: var(--teal-dark); }
        .carousel-arrow.left  { left: -18px; }
        .carousel-arrow.right { right: -18px; }

        /* ── Roommate listing card ───────────────────────────────────── */
        .roommate-card {
            scroll-snap-align: start;
            background: rgba(255,255,255,0.90);
            backdrop-filter: blur(10px);
            border: 1.5px solid rgba(93,209,227,0.22);
            border-radius: 14px;
            overflow: hidden;
            transition: transform 0.25s, box-shadow 0.25s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }
        .roommate-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 36px rgba(26,122,138,0.16);
        }

        .card-photo {
            width: 100%;
            height: 160px;
            background: linear-gradient(135deg, rgba(93,209,227,0.15) 0%, rgba(26,122,138,0.22) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }
        .card-photo img { width: 100%; height: 100%; object-fit: cover; }

        .card-badge {
            position: absolute;
            top: 10px; right: 10px;
            background: var(--teal-dark);
            color: white;
            font-size: 0.65rem;
            font-weight: 500;
            padding: 3px 9px;
            border-radius: 20px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .card-body {
            padding: 14px 16px 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .card-name {
            font-family: var(--font-display);
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--text);
        }

        .card-location {
            font-size: 0.78rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .card-location svg { width: 11px; height: 11px; fill: var(--teal-dark); flex-shrink: 0; }

        .card-price {
            font-family: var(--font-display);
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--teal-dark);
        }
        .card-price span {
            font-family: var(--font-body);
            font-size: 0.75rem;
            font-weight: 400;
            color: var(--text-muted);
        }

        .card-tags { display: flex; flex-wrap: wrap; gap: 5px; }
        .tag {
            font-size: 0.7rem;
            font-weight: 500;
            padding: 2px 9px;
            border-radius: 20px;
            background: rgba(93,209,227,0.12);
            color: var(--teal-dark);
            border: 1px solid rgba(93,209,227,0.3);
        }

        .card-bio {
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.55;
            margin-top: auto;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-cta {
            display: block;
            text-align: center;
            margin-top: 12px;
            padding: 8px 0;
            background: transparent;
            border: 1.5px solid var(--teal-dark);
            border-radius: 7px;
            color: var(--teal-dark);
            font-size: 0.8rem;
            font-weight: 500;
            text-decoration: none;
            transition: background 0.18s, color 0.18s;
        }
        .card-cta:hover { background: var(--teal-dark); color: white; }

        /* ── Expanded card modal ────────────────────────────────────── */
        .card-expand-backdrop {
            position: fixed;
            inset: 0;
            z-index: 3000;
            background: rgba(28, 58, 85, 0.55);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            cursor: pointer; /* click outside to close */
        }
        .card-expand-backdrop.active {
            opacity: 1;
            pointer-events: all;
        }

        .card-expand {
            cursor: default;
            position: relative;
            background: white;
            border-radius: 20px;
            width: min(700px, 90vw);
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 30px 80px rgba(28,58,85,0.28);
            display: flex;
            flex-direction: column;
            transform: translateY(20px) scale(0.97);
            transition: transform 0.3s cubic-bezier(0.22,1,0.36,1);
        }
        .card-expand-backdrop.active .card-expand {
            transform: translateY(0) scale(1);
        }

        .card-expand-photo {
            width: 100%;
            height: 280px;
            background: linear-gradient(135deg, rgba(93,209,227,0.2) 0%, rgba(26,122,138,0.3) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border-radius: 20px 20px 0 0;
            overflow: hidden;
            position: relative;
        }
        .card-expand-photo img { width: 100%; height: 100%; object-fit: cover; }
        .card-expand-photo .expand-avatar { font-size: 6rem; }

        .card-expand-badge {
            position: absolute;
            top: 16px; right: 16px;
            background: var(--teal-dark);
            color: white;
            font-size: 0.72rem;
            font-weight: 500;
            padding: 4px 12px;
            border-radius: 20px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .card-expand-body {
            padding: 28px 32px 32px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card-expand-name {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 700;
            color: var(--text);
            line-height: 1.1;
        }

        .card-expand-location {
            font-size: 0.9rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .card-expand-location svg { width: 14px; height: 14px; fill: var(--teal-dark); }

        .card-expand-price {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--teal-dark);
        }
        .card-expand-price span {
            font-family: var(--font-body);
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--text-muted);
        }

        .card-expand-tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .card-expand-tags .tag {
            font-size: 0.8rem;
            padding: 4px 14px;
        }

        .card-expand-bio {
            font-size: 0.95rem;
            color: var(--text);
            line-height: 1.7;
            border-top: 1px solid rgba(93,209,227,0.2);
            padding-top: 16px;
        }

        .card-expand-cta {
            display: block;
            text-align: center;
            padding: 12px 0;
            background: var(--teal-dark);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.18s;
            margin-top: 4px;
        }
        .card-expand-cta:hover { background: var(--blue-dark); color: white; }

        .card-expand-close {
            position: absolute;
            top: 14px; right: 14px;
            background: rgba(255,255,255,0.85);
            border: none;
            border-radius: 50%;
            width: 32px; height: 32px;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            z-index: 10;
            transition: background 0.15s;
        }
        .card-expand-close:hover { background: white; }

        /* ── Responsive ─────────────────────────────────────────────── */
        @media (max-width: 900px) {
            .hero { padding: 80px 1.25rem 40px; }
            .hero-inner { padding: 18px; }
            .search-bar { flex-direction: column; align-items: stretch; }
            .search-divider { width: 100%; height: 1px; margin: 0; }
            .search-btn { width: 100%; min-height: 48px; }
            .roommate-section { padding: 40px 0 0; }
            .carousel-track { grid-auto-columns: calc((100% - 16px) / 2); }
            .card-expand-body { padding: 20px; }
        }
        @media (max-width: 600px) {
            .carousel-track { grid-auto-columns: 85%; }
            .carousel-arrow { display: none; }
            .card-expand-photo { height: 200px; }
        }
    </style>
</head>

<body>

    <!-- ── Top Banner (new version: nav-bear + student housing) ────── -->
    <div class="top-banner">
        <a href="/" style="text-decoration:none;"><h1>BearEstate</h1></a>
        <div class="nav-right">
            <img
                src="{% static 'images/bear.png' %}"
                alt="BearEstate polar bear mascot"
                class="nav-bear"
                data-darkreader-ignore
            >
            <div class="nav-buttons">
                <a href="#" class="btn-login" id="loginBtn">Log In</a>
                <a href="#" class="btn-signup" id="signupBtn">Sign Up</a>
            </div>
        </div>
    </div>

    <!-- Triangle (grows on scroll) -->
    <div id="triangle" class="triangle"></div>

    <!-- ── Hero Section — background image behind, search bar inside ── -->
    <section class="hero hero-bg">

        <!-- Background image bisecting hero only -->
        <img
            src="{% static 'images/college_snow.jpg' %}"
            alt=""
            class="hero-bg-img"
            aria-hidden="true"
            data-darkreader-ignore
        >

        <div class="hero-grid">
            <div class="hero-inner">

                <!-- Search Bar -->
                <div class="search-bar" role="search" aria-label="Housing search">
                    <div class="search-field">
                        <label for="searchLocation">Location</label>
                        <input id="searchLocation" type="text" placeholder="City, neighborhood, or ZIP…" />
                    </div>
                    <div class="search-divider"></div>
                    <div class="search-field">
                        <label for="searchIntent">Looking to</label>
                        <select id="searchIntent">
                            <option value="rent" selected>Rent</option>
                            <option value="buy">Buy</option>
                        </select>
                    </div>
                    <div class="search-divider"></div>
                    <div class="search-field">
                        <label for="searchType">Type</label>
                        <select id="searchType">
                            <option>Any Type</option>
                            <option>House</option>
                            <option>Apartment</option>
                            <option>Condo</option>
                            <option>Townhouse</option>
                        </select>
                    </div>
                    <div class="search-divider"></div>
                    <div class="search-field">
                        <label for="searchBudget" id="budgetLabel">Monthly Rent</label>
                        <select id="searchBudget">
                            <option value="any">Any Rent</option>
                            <option value="0-900">Under $900</option>
                            <option value="900-1400">$900 – $1,400</option>
                            <option value="1400-2000">$1,400 – $2,000</option>
                            <option value="2000-999999">$2,000+</option>
                        </select>
                    </div>
                    <button class="search-btn" id="searchBtn" type="button">Search →</button>
                </div>

            </div>
        </div>
    </section>

    <!-- ── Roommate Section with baby blue card ─────────────────────── -->
    <section class="roommate-section">
        <div class="roommate-section-inner">
            <!-- Baby blue card reaching both sides -->
            <div class="roommate-card-wrap">
                <div class="roommate-card-wrap-header">
                    <h3>Roommate Postings</h3>
                </div>

                <div class="carousel-outer">
                    <button class="carousel-arrow left" id="arrowLeft">&#8592;</button>
                    <div class="carousel-track" id="carouselTrack"></div>
                    <button class="carousel-arrow right" id="arrowRight">&#8594;</button>
                </div>
            </div>
        </div>
    </section>

    <!-- ── Expanded Card Modal ───────────────────────────────────────── -->
    <div class="card-expand-backdrop" id="cardExpandBackdrop">
        <div class="card-expand" id="cardExpandPanel">
            <button class="card-expand-close" id="cardExpandClose">✕</button>
            <div class="card-expand-photo" id="expandPhoto"></div>
            <div class="card-expand-body">
                <div class="card-expand-name" id="expandName"></div>
                <div class="card-expand-location" id="expandLocation"></div>
                <div class="card-expand-price" id="expandPrice"></div>
                <div class="card-expand-tags" id="expandTags"></div>
                <p class="card-expand-bio" id="expandBio"></p>
                <a href="#" class="card-expand-cta" id="expandCta">Message →</a>
            </div>
        </div>
    </div>

    <!-- ── Login / Signup Modal ─────────────────────────────────────── -->
    <div class="modal-backdrop" id="modalBackdrop">
        <div class="modal">
            <button class="modal-close" id="modalClose">✕</button>
            <div class="modal-tabs">
                <button class="tab active" id="tabLogin">Log In</button>
                <button class="tab" id="tabSignup">Sign Up</button>
            </div>
            <div class="form-panel" id="formLogin">
                <h2 class="modal-title">Welcome back</h2>
                <p class="modal-sub">Log in to see saved properties</p>
                <div class="field"><label>Email</label><input type="email" placeholder="youremail@example.com" /></div>
                <div class="field"><label>Password</label><input type="password" placeholder="••••••••" /></div>
                <a href="#" class="forgot">Forgot password?</a>
                <button class="btn-submit">Log In</button>
                <p class="switch-text">No account? <a href="#" id="switchToSignup">Sign up</a></p>
            </div>
            <div class="form-panel hidden" id="formSignup">
                <h2 class="modal-title">Create account</h2>
                <p class="modal-sub">Join thousands of students finding housing</p>
                <div class="field"><label>Full Name</label><input type="text" placeholder="Jane Smith" /></div>
                <div class="field"><label>Email</label><input type="email" placeholder="you@example.com" /></div>
                <div class="field"><label>Password</label><input type="password" placeholder="Create a password" /></div>
                <button class="btn-submit">Create Account</button>
                <p class="switch-text">Already have an account? <a href="#" id="switchToLogin">Log in</a></p>
            </div>
        </div>
    </div>

    <!-- Triangle Scroll Script -->
    <script>
        window.addEventListener("scroll", function() {
            let scrollY = window.scrollY;
            let triangle = document.getElementById("triangle");
            let newSize = 350 + scrollY * 0.6;
            triangle.style.borderLeft = newSize + "px solid #1a7a8a";
            triangle.style.borderBottom = "60px solid transparent";
        });
    </script>

    <!-- Rent/Buy Budget Swap Script -->
    <script>
    	const searchIntent = document.getElementById('searchIntent');
    	const budgetLabel  = document.getElementById('budgetLabel');
    	const searchBudget = document.getElementById('searchBudget');

    	const rentOptions = [
            { value: 'any', label: 'Any Rent' },
            { value: '0-900', label: 'Under $900' },
            { value: '900-1400', label: '$900 – $1,400' },
            { value: '1400-2000', label: '$1,400 – $2,000' },
            { value: '2000-999999', label: '$2,000+' },
    	];

    	const buyOptions = [
            { value: 'any', label: 'Any Price' },
            { value: '0-300000', label: 'Under $300k' },
            { value: '300000-600000', label: '$300k – $600k' },
            { value: '600000-1000000', label: '$600k – $1M' },
            { value: '1000000-999999999', label: '$1M+' },
    	];
	
    	function setSelectOptions(selectEl, optionsList) {
       	    selectEl.innerHTML = '';
            for (const opt of optionsList) {
                const optionEl = document.createElement('option');
                optionEl.value = opt.value;
                optionEl.textContent = opt.label;
                selectEl.appendChild(optionEl);
            }
        }

    	function updateBudgetOptions() {
            const mode = searchIntent.value;

            if (mode === 'rent') {
                budgetLabel.textContent = 'Monthly Rent';
                setSelectOptions(searchBudget, rentOptions);
            } else {
                budgetLabel.textContent = 'Purchase Price';
                setSelectOptions(searchBudget, buyOptions);
            }
        }

    	searchIntent.addEventListener('change', updateBudgetOptions);
    	updateBudgetOptions();

    	document.getElementById('searchBtn').addEventListener('click', () => {
            const location = document.getElementById('searchLocation').value.trim();
            const mode = searchIntent.value;
            const type = document.getElementById('searchType').value;
            const budget = searchBudget.value;

            const params = new URLSearchParams();

            if (location) {
                params.set('location', location);
            }

            if (mode) {
                params.set('mode', mode);
            }

            if (type && type !== 'Any Type') {
                params.set('type', type);
            }

            if (budget) {
                params.set('budget', budget);
            }

            const searchUrl = "{% url 'search' %}";
            window.location.href = params.toString()
                ? `${searchUrl}?${params.toString()}`
                : searchUrl;
        });
    </script>
    <!-- Roommate Carousel + Expand Script -->
    <script>
        const DEMO_LISTINGS = [
            { id:1, name:"Mara Thompson",  location:"Anchorage, AK", rent:850, type:"Apartment", looking_for:"Female", tags:["Non-smoker","Pet-friendly","WFH"],            bio:"Grad student studying environmental science. Very tidy and respect shared spaces. Love hiking and kayaking on weekends. Looking for someone laid-back who values a clean, quiet home.", photo_url:null, status:"Active" },
            { id:2, name:"Jake Sorenson",  location:"Fairbanks, AK", rent:620, type:"House",     looking_for:"Any",    tags:["Outdoorsy","Quiet hours","Split utilities"],   bio:"Wildlife biologist who spends a lot of time in the field. When I'm home I keep to myself. Need a responsible co-tenant who can manage things while I'm away and respects the shared space.", photo_url:null, status:"Active" },
            { id:3, name:"Priya Nair",     location:"Juneau, AK",    rent:975, type:"Condo",     looking_for:"Any",    tags:["Vegetarian kitchen","Remote-worker","No pets"], bio:"Software engineer working remotely. Tidy, quiet, and home most days. The condo has stunning harbor views from the living room. Prefer a non-smoker who respects a vegetarian kitchen.", photo_url:null, status:"Active" },
            { id:4, name:"Cole Whitfield", location:"Wasilla, AK",   rent:700, type:"Townhouse", looking_for:"Male",   tags:["Pet-friendly","Flexible lease","Garage"],       bio:"Mechanic by trade, easy-going by nature. Pet-friendly home with a large garage. Looking for someone who respects shared spaces and doesn't mind the occasional dog visit.", photo_url:null, status:"Active" },
        ];

        const AVATARS = ["🧑‍🦱","👩‍🦰","🧑‍🦳","👨‍🦲"];

        // ── Expand modal elements ──
        const expandBackdrop = document.getElementById('cardExpandBackdrop');
        const expandPanel    = document.getElementById('cardExpandPanel');
        const expandClose    = document.getElementById('cardExpandClose');

        function openExpand(p, idx) {
            const photo = p.photo_url
                ? `<img src="${p.photo_url}" alt="${p.name}">`
                : `<span class="expand-avatar">${AVATARS[idx % AVATARS.length]}</span>`;

            document.getElementById('expandPhoto').innerHTML =
                `${photo}<span class="card-expand-badge">${p.status || 'Active'}</span>`;
            document.getElementById('expandName').textContent = p.name;
            document.getElementById('expandLocation').innerHTML = `
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/>
                </svg>
                ${p.location} &nbsp;·&nbsp; ${p.type}`;
            document.getElementById('expandPrice').innerHTML =
                `$${p.rent.toLocaleString()}<span> / month</span>`;
            document.getElementById('expandTags').innerHTML =
                (p.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
            document.getElementById('expandBio').textContent = p.bio;
            document.getElementById('expandCta').href = `/roommate/${p.id}/`;

            expandBackdrop.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeExpand() {
            expandBackdrop.classList.remove('active');
            document.body.style.overflow = '';
        }

        // Close when clicking the backdrop (outside the panel)
        expandBackdrop.addEventListener('click', e => {
            if (e.target === expandBackdrop) closeExpand();
        });
        expandClose.addEventListener('click', closeExpand);
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeExpand(); });

        // ── Build small carousel cards ──
        function buildCard(p, idx) {
            const card = document.createElement('div');
            card.className = 'roommate-card';
            const photo = p.photo_url
                ? `<img src="${p.photo_url}" alt="${p.name}">`
                : `<span style="font-size:3rem">${AVATARS[idx % AVATARS.length]}</span>`;
            const tags = (p.tags || []).slice(0,3).map(t => `<span class="tag">${t}</span>`).join('');
            card.innerHTML = `
                <div class="card-photo">
                    ${photo}
                    <span class="card-badge">${p.status || 'Active'}</span>
                </div>
                <div class="card-body">
                    <div class="card-name">${p.name}</div>
                    <div class="card-location">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/>
                        </svg>
                        ${p.location}
                    </div>
                    <div class="card-price">$${p.rent.toLocaleString()}<span> / mo · ${p.type}</span></div>
                    <div class="card-tags">${tags}</div>
                    <p class="card-bio">${p.bio}</p>
                </div>`;
            card.addEventListener('click', () => openExpand(p, idx));
            return card;
        }

        const track = document.getElementById('carouselTrack');
        DEMO_LISTINGS.forEach((p, i) => track.appendChild(buildCard(p, i)));

        document.getElementById('arrowLeft').addEventListener('click',  () => track.scrollBy({ left: -(track.clientWidth / 3 + 16), behavior: 'smooth' }));
        document.getElementById('arrowRight').addEventListener('click', () => track.scrollBy({ left:  (track.clientWidth / 3 + 16), behavior: 'smooth' }));
    </script>

    <!-- Modal Script -->
    <script>
        const backdrop  = document.getElementById('modalBackdrop');
        const loginBtn  = document.getElementById('loginBtn');
        const signupBtn = document.getElementById('signupBtn');
        const closeBtn  = document.getElementById('modalClose');
        const tabLogin  = document.getElementById('tabLogin');
        const tabSignup = document.getElementById('tabSignup');
        const formLogin  = document.getElementById('formLogin');
        const formSignup = document.getElementById('formSignup');
        const switchSU   = document.getElementById('switchToSignup');
        const switchLI   = document.getElementById('switchToLogin');

        function showModal(mode) { backdrop.classList.add('active'); setTab(mode); }
        function hideModal()     { backdrop.classList.remove('active'); }
        function setTab(mode) {
            const isLogin = mode === 'login';
            tabLogin.classList.toggle('active', isLogin);
            tabSignup.classList.toggle('active', !isLogin);
            formLogin.classList.toggle('hidden', !isLogin);
            formSignup.classList.toggle('hidden', isLogin);
        }

        loginBtn.addEventListener('click',  e => { e.preventDefault(); showModal('login');  });
        signupBtn.addEventListener('click', e => { e.preventDefault(); showModal('signup'); });
        closeBtn.addEventListener('click',  hideModal);
        backdrop.addEventListener('click',  e => { if (e.target === backdrop) hideModal(); });
        tabLogin.addEventListener('click',  () => setTab('login'));
        tabSignup.addEventListener('click', () => setTab('signup'));
        switchSU.addEventListener('click',  e => { e.preventDefault(); setTab('signup'); });
        switchLI.addEventListener('click',  e => { e.preventDefault(); setTab('login');  });
    </script>

</body>
